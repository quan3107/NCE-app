# File: docs/openapi/schemas/grades.yaml
# Purpose: Define grade schemas for the API.
# Why: Documents grading request/response payloads.

Grade:
  type: object
  properties:
    id:
      type: string
      format: uuid
    submissionId:
      type: string
      format: uuid
    graderId:
      type: string
      format: uuid
    graderName:
      type: string
    rubricBreakdown:
      type: array
      nullable: true
      description: >
        For IELTS writing and speaking grades, contains the official IELTS
        criterion names with band values in 0.5 increments from 0 to 9.
      items:
        type: object
        properties:
          criterion:
            type: string
            enum:
              - Task Achievement
              - Task Response
              - Coherence and Cohesion
              - Lexical Resource
              - Grammatical Range and Accuracy
              - Fluency and Coherence
              - Pronunciation
          points:
            type: number
            minimum: 0
            maximum: 9
            multipleOf: 0.5
    rawScore:
      type: number
      nullable: true
    adjustments:
      type: array
      nullable: true
      items:
        type: object
        properties:
          reason:
            type: string
          delta:
            type: number
    finalScore:
      type: number
      nullable: true
    band:
      type: number
      nullable: true
      minimum: 0
      maximum: 9
      multipleOf: 0.5
    feedback:
      type: string
      nullable: true
    gradedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    deletedAt:
      type: string
      format: date-time
      nullable: true
  required: [id, submissionId, graderId, createdAt, updatedAt]

UpsertGradeRequest:
  type: object
  properties:
    rubricBreakdown:
      type: array
      description: >
        Required for IELTS writing and speaking assignments. Writing grades must
        include exactly one Task Achievement or Task Response criterion plus
        Coherence and Cohesion, Lexical Resource, and Grammatical Range and
        Accuracy. Speaking grades must include Fluency and Coherence, Lexical
        Resource, Grammatical Range and Accuracy, and Pronunciation. Criterion
        points must be IELTS bands in 0.5 increments from 0 to 9.
      items:
        type: object
        properties:
          criterion:
            type: string
            enum:
              - Task Achievement
              - Task Response
              - Coherence and Cohesion
              - Lexical Resource
              - Grammatical Range and Accuracy
              - Fluency and Coherence
              - Pronunciation
          points:
            type: number
            minimum: 0
            maximum: 9
            multipleOf: 0.5
    rawScore:
      type: number
    adjustments:
      type: array
      items:
        type: object
        properties:
          reason:
            type: string
          delta:
            type: number
    finalScore:
      type: number
    band:
      type: number
      minimum: 0
      maximum: 9
      multipleOf: 0.5
    feedbackMd:
      type: string
