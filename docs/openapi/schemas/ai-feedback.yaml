# File: docs/openapi/schemas/ai-feedback.yaml
# Purpose: Define reusable AI feedback schemas for OpenAPI.
# Why: Documents provider readiness metadata without exposing provider secrets.

AiFeedbackHealthStatus:
  type: string
  enum: [disabled, configured, healthy, unhealthy, timeout, misconfigured]

AiFeedbackDraftStatus:
  type: string
  enum: [queued, running, accepted, review_required, rejected, failed, approved, finalized, superseded]

AiFeedbackVisibilityMode:
  type: string
  enum: [teacher_reviewed, instant_student_visible, hidden]

AiFeedbackDraftDecision:
  type: string
  enum: [accepted, approved, rejected, finalized]

AiReasoningEffort:
  type: string
  enum: [none, low, medium, high, xhigh]

AiFeedbackRouteMetadata:
  type: object
  required: [model, reasoning_effort, supports_image_input]
  properties:
    model:
      type: string
      example: gpt-5.4-nano
    reasoning_effort:
      $ref: '#/AiReasoningEffort'
    supports_image_input:
      type: boolean
      description: Whether this hosted route may receive backend-validated image content parts.
      example: true

AiFeedbackHealthResponse:
  type: object
  required: [status, enabled, checked_at, provider, limits, routes]
  properties:
    status:
      $ref: '#/AiFeedbackHealthStatus'
    enabled:
      type: boolean
      example: false
    checked_at:
      type: string
      format: date-time
    provider:
      type: object
      required: [name, base_url, health_path]
      properties:
        name:
          type: string
          example: openai-compatible
        base_url:
          type: string
          description: Provider base URL with credentials and sensitive query values redacted.
          example: https://api.openai.com/v1
        health_path:
          type: string
          example: /models
        http_status:
          type: integer
          example: 200
    limits:
      type: object
      required: [timeout_ms, max_input_chars, max_output_tokens, image_max_bytes, image_supported_mime_types]
      properties:
        timeout_ms:
          type: integer
          example: 10000
        max_input_chars:
          type: integer
          example: 12000
        max_output_tokens:
          type: integer
          example: 1200
        image_max_bytes:
          type: integer
          description: Maximum backend-validated image size accepted for hosted AI image input.
          example: 20971520
        image_supported_mime_types:
          type: array
          description: MIME types accepted for hosted AI image input.
          items:
            type: string
          example: [image/png, image/jpeg, image/webp, image/gif]
    routes:
      type: object
      required: [low_cost, premium]
      properties:
        low_cost:
          $ref: '#/AiFeedbackRouteMetadata'
        premium:
          $ref: '#/AiFeedbackRouteMetadata'
    problem:
      type: string
      example: Provider health check timed out.

WritingFeedbackResponse:
  type: object
  required: [id, status, visibilityMode]
  properties:
    id:
      type: string
      format: uuid
    status:
      $ref: '#/AiFeedbackDraftStatus'
    visibilityMode:
      $ref: '#/AiFeedbackVisibilityMode'
    pollingLocation:
      type: string
      example: /api/v1/submissions/11111111-1111-4111-8111-111111111111/ai-feedback/writing
    feedback:
      type: object
      additionalProperties: true
      description: Present only for terminal draft states that include provider output or review-required failure context.
    failureCode:
      type: string
      example: image_context_unavailable
    failureMessage:
      type: string
      example: Task 1 is visual, but no image file is attached.

WritingFeedbackCriterionSuggestion:
  type: object
  required: [criterion, points]
  properties:
    criterion:
      type: string
      example: Coherence and Cohesion
    points:
      type: number
      format: float
      minimum: 0
      maximum: 9
      example: 6.5

WritingFeedbackApprovalRequest:
  type: object
  required: [feedbackMd]
  properties:
    feedbackMd:
      type: string
      description: Teacher-edited Markdown feedback to publish to the existing grade.
      example: Clear overview and relevant details; improve paragraph cohesion.
    normalizedCriterionSuggestions:
      type: array
      description: Optional IELTS criterion suggestions validated against current writing band rules before storing.
      items:
        $ref: '#/WritingFeedbackCriterionSuggestion'

WritingFeedbackRejectRequest:
  type: object
  properties:
    reason:
      type: string
      description: Optional teacher reason retained with the rejected draft for audit.
      example: Feedback overstates task response and should be regenerated.

WritingFeedbackRegenerateRequest:
  type: object
  properties:
    providerTier:
      type: string
      enum: [low_cost, premium]
      description: Optional provider route override for this regeneration only.

WritingFeedbackReviewResponse:
  allOf:
    - $ref: '#/WritingFeedbackResponse'
    - type: object
      properties:
        decision:
          type: string
          nullable: true
          enum: [accepted, approved, rejected, finalized]
        gradeId:
          type: string
          format: uuid
          nullable: true
        decidedAt:
          type: string
          format: date-time
          nullable: true
        finalizedAt:
          type: string
          format: date-time
          nullable: true
        teacherEditedFeedback:
          type: object
          nullable: true
          additionalProperties: true
        normalizedCriterionSuggestions:
          type: array
          nullable: true
          items:
            $ref: '#/WritingFeedbackCriterionSuggestion'

WritingFeedbackHistoryResponse:
  type: object
  required: [drafts]
  properties:
    drafts:
      type: array
      items:
        $ref: '#/WritingFeedbackReviewResponse'
