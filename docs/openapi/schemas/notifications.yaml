# File: docs/openapi/schemas/notifications.yaml
# Purpose: Define notification schemas for the API.
# Why: Documents notification payloads used in delivery flows.

Notification:
  type: object
  properties:
    id:
      type: string
      format: uuid
    userId:
      type: string
      format: uuid
    type:
      type: string
    payload:
      type: object
      additionalProperties: true
    channel:
      $ref: './common.yaml#/NotificationChannel'
    status:
      $ref: './common.yaml#/NotificationStatus'
    sentAt:
      type: string
      format: date-time
      nullable: true
    readAt:
      type: string
      format: date-time
      nullable: true
    attemptCount:
      type: integer
      format: int32
      description: Number of delivery attempts already made.
    maxAttempts:
      type: integer
      format: int32
      description: Maximum delivery attempts before dead-lettering.
    nextAttemptAt:
      type: string
      format: date-time
      nullable: true
      description: Next retry time for queued transport failures.
    lastAttemptAt:
      type: string
      format: date-time
      nullable: true
      description: Most recent delivery attempt time.
    failureReason:
      type: string
      nullable: true
      description: Redacted delivery failure or suppression reason.
    deadLetteredAt:
      type: string
      format: date-time
      nullable: true
      description: Time the notification reached the dead-letter state.
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    deletedAt:
      type: string
      format: date-time
      nullable: true
  required:
    - id
    - userId
    - type
    - payload
    - channel
    - status
    - attemptCount
    - maxAttempts
    - createdAt
    - updatedAt

CreateNotificationRequest:
  type: object
  properties:
    userId:
      type: string
      format: uuid
    channel:
      $ref: './common.yaml#/NotificationChannel'
    template:
      type: string
    payload:
      type: object
      additionalProperties: true
  required: [userId, channel, template]

MarkNotificationsReadRequest:
  type: object
  properties:
    userId:
      type: string
      format: uuid
    notificationIds:
      type: array
      items:
        type: string
        format: uuid
  required: [userId]

MarkNotificationsReadResponse:
  type: object
  properties:
    userId:
      type: string
      format: uuid
    updatedCount:
      type: integer
      format: int32
  required: [userId, updatedCount]

ResendNotificationResponse:
  allOf:
    - $ref: '#/Notification'
