# File: docs/openapi/schemas/assignments.yaml
# Purpose: Define assignment schemas for the API.
# Why: Documents assignment request/response payloads.

Assignment:
  type: object
  properties:
    id:
      type: string
      format: uuid
    courseId:
      type: string
      format: uuid
    title:
      type: string
    description:
      type: string
      nullable: true
    type:
      $ref: './common.yaml#/AssignmentType'
    dueAt:
      type: string
      format: date-time
      nullable: true
    latePolicy:
      $ref: '#/NullableLatePolicy'
    assignmentConfig:
      nullable: true
      description: IELTS assignment configuration payload (shape depends on assignment type).
      anyOf:
        - $ref: '#/IeltsAssignmentConfig'
        - type: object
          additionalProperties: true
    publishedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    deletedAt:
      type: string
      format: date-time
      nullable: true
  required: [id, courseId, title, type, createdAt, updatedAt]

CreateAssignmentRequest:
  type: object
  properties:
    title:
      type: string
    descriptionMd:
      type: string
    type:
      $ref: './common.yaml#/AssignmentType'
    dueAt:
      type: string
    latePolicy:
      $ref: '#/LatePolicy'
    assignmentConfig:
      description: IELTS assignment configuration payload (shape depends on assignment type).
      anyOf:
        - $ref: '#/IeltsAssignmentConfig'
        - type: object
          additionalProperties: true
    publishedAt:
      type: string
  required: [title, type]

UpdateAssignmentRequest:
  type: object
  properties:
    title:
      type: string
    descriptionMd:
      type: string
    type:
      $ref: './common.yaml#/AssignmentType'
    dueAt:
      type: string
    latePolicy:
      $ref: '#/LatePolicy'
    assignmentConfig:
      description: IELTS assignment configuration payload (shape depends on assignment type).
      anyOf:
        - $ref: '#/IeltsAssignmentConfig'
        - type: object
          additionalProperties: true
    publishedAt:
      type: string

LatePolicy:
  type: object
  oneOf:
    - $ref: '#/ClosedLatePolicy'
    - $ref: '#/PercentLatePolicy'
    - $ref: '#/PerDayLatePolicy'

NullableLatePolicy:
  type: object
  nullable: true
  oneOf:
    - $ref: '#/ClosedLatePolicy'
    - $ref: '#/PercentLatePolicy'
    - $ref: '#/PerDayLatePolicy'

ClosedLatePolicy:
  type: object
  properties:
    type:
      type: string
      enum: [closed, none, no_late]
  required: [type]
  additionalProperties: false

PercentLatePolicy:
  type: object
  properties:
    type:
      type: string
      enum: [percent, percent_penalty]
    value:
      type: number
      minimum: 0
      maximum: 100
  required: [type, value]
  additionalProperties: false

PerDayLatePolicy:
  type: object
  properties:
    type:
      type: string
      enum: [per_day, per_day_penalty]
    value:
      type: number
      minimum: 0
  required: [type, value]
  additionalProperties: false

IeltsAssignmentConfig:
  oneOf:
    - $ref: '#/IeltsReadingAssignmentConfig'
    - $ref: '#/IeltsListeningAssignmentConfig'
    - $ref: '#/IeltsWritingAssignmentConfig'
    - $ref: '#/IeltsSpeakingAssignmentConfig'

IeltsTimingConfig:
  type: object
  properties:
    enabled:
      type: boolean
    durationMinutes:
      type: integer
      minimum: 1
    enforce:
      type: boolean
    startAt:
      type: string
      format: date-time
    endAt:
      type: string
      format: date-time
    autoSubmit:
      type: boolean
    rejectLateStart:
      type: boolean
  required: [enabled, durationMinutes, enforce]
  additionalProperties: false

IeltsAttemptsConfig:
  type: object
  properties:
    maxAttempts:
      type: integer
      minimum: 1
      nullable: true
  required: [maxAttempts]
  additionalProperties: false

IeltsBaseAssignmentConfig:
  type: object
  properties:
    version:
      type: integer
      enum: [1]
    aiPolicy:
      $ref: '#/AssignmentAiPolicy'
    timing:
      $ref: '#/IeltsTimingConfig'
    instructions:
      type: string
    attempts:
      $ref: '#/IeltsAttemptsConfig'
  required: [version]
  additionalProperties: true

AssignmentAiPolicy:
  type: object
  description: Teacher-controlled AI behavior for the assignment.
  properties:
    writingFeedbackMode:
      type: string
      description: Writing feedback is supported only for writing assignments.
      enum: [off, teacher_reviewed, instant_student_visible]
      default: off
    objectiveExplanations:
      type: string
      description: On-demand objective explanations are supported only for reading and listening assignments.
      enum: [off, on_demand_student_visible]
      default: off
    providerTier:
      type: string
      enum: [auto, low_cost, premium]
      default: auto
  required: [writingFeedbackMode, objectiveExplanations, providerTier]
  additionalProperties: false

IeltsQuestion:
  type: object
  additionalProperties: true

IeltsSectionBase:
  type: object
  properties:
    id:
      type: string
    title:
      type: string
    questions:
      type: array
      items:
        $ref: '#/IeltsQuestion'
  required: [id, title, questions]
  additionalProperties: true

IeltsReadingSection:
  allOf:
    - $ref: '#/IeltsSectionBase'
    - type: object
      properties:
        passage:
          type: string
      required: [passage]
      additionalProperties: true

IeltsListeningSection:
  allOf:
    - $ref: '#/IeltsSectionBase'
    - type: object
      properties:
        audioFileId:
          type: string
          format: uuid
          nullable: true
        playback:
          type: object
          properties:
            limitPlays:
              type: integer
              minimum: 0
          required: [limitPlays]
          additionalProperties: false
      additionalProperties: true

IeltsReadingAssignmentConfig:
  allOf:
    - $ref: '#/IeltsBaseAssignmentConfig'
    - type: object
      properties:
        sections:
          type: array
          items:
            $ref: '#/IeltsReadingSection'
      required: [sections]

IeltsListeningAssignmentConfig:
  allOf:
    - $ref: '#/IeltsBaseAssignmentConfig'
    - type: object
      properties:
        sections:
          type: array
          items:
            $ref: '#/IeltsListeningSection'
      required: [sections]

IeltsWritingTask:
  type: object
  properties:
    prompt:
      type: string
    imageFileId:
      type: string
      format: uuid
      nullable: true
  required: [prompt]
  additionalProperties: true

IeltsWritingTaskTwo:
  type: object
  properties:
    prompt:
      type: string
  required: [prompt]
  additionalProperties: true

IeltsWritingAssignmentConfig:
  allOf:
    - $ref: '#/IeltsBaseAssignmentConfig'
    - type: object
      properties:
        task1:
          $ref: '#/IeltsWritingTask'
        task2:
          $ref: '#/IeltsWritingTaskTwo'
      required: [task1, task2]

IeltsSpeakingPart:
  type: object
  properties:
    questions:
      type: array
      items:
        type: string
  required: [questions]
  additionalProperties: true

IeltsSpeakingPartTwo:
  type: object
  properties:
    cueCard:
      type: object
      properties:
        topic:
          type: string
        bulletPoints:
          type: array
          items:
            type: string
      required: [topic, bulletPoints]
      additionalProperties: false
    prepSeconds:
      type: integer
      minimum: 0
    talkSeconds:
      type: integer
      minimum: 0
  required: [cueCard, prepSeconds, talkSeconds]
  additionalProperties: true

IeltsSpeakingAssignmentConfig:
  allOf:
    - $ref: '#/IeltsBaseAssignmentConfig'
    - type: object
      properties:
        part1:
          $ref: '#/IeltsSpeakingPart'
        part2:
          $ref: '#/IeltsSpeakingPartTwo'
        part3:
          $ref: '#/IeltsSpeakingPart'
      required: [part1, part2, part3]
