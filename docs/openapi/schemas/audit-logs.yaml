# File: docs/openapi/schemas/audit-logs.yaml
# Purpose: Define audit log schemas for admin audit endpoints.
# Why: Documents immutable audit history exposed to administrators.

AuditLogActor:
  type: object
  properties:
    id:
      type: string
      format: uuid
    fullName:
      type: string
  required: [id, fullName]

AuditLog:
  type: object
  properties:
    id:
      type: string
      format: uuid
    actorId:
      type: string
      format: uuid
      nullable: true
    actor:
      $ref: './audit-logs.yaml#/AuditLogActor'
      nullable: true
    action:
      type: string
    entity:
      type: string
    entityId:
      type: string
    diff:
      type: object
      description: Redacted audit summary. Sensitive text, credentials, tokens, OAuth payloads, and file keys are summarized instead of stored verbatim.
      additionalProperties: true
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    deletedAt:
      type: string
      format: date-time
      nullable: true
  required: [id, action, entity, entityId, createdAt, updatedAt]

AuditLogPage:
  type: object
  properties:
    data:
      type: array
      items:
        $ref: './audit-logs.yaml#/AuditLog'
    nextOffset:
      type: integer
      format: int32
      nullable: true
      description: Offset for the next page, or null when no more rows are available.
  required: [data, nextOffset]

AuditLogRedactedValue:
  type: object
  properties:
    redacted:
      type: boolean
      enum: [true]
    reason:
      type: string
      enum: [sensitive-key, sensitive-value]
    hash:
      type: string
      nullable: true
    length:
      type: integer
      nullable: true
  required: [redacted, reason]
