# File: docs/openapi/schemas/nce-content.yaml
# Purpose: Define read-only NCE content response schemas.
# Why: Keeps frontend and backend content contracts documented.

NcePublishStatus:
  type: string
  enum: [draft, published, archived]

NceExerciseType:
  type: string
  enum:
    - vocabulary
    - grammar
    - listening
    - speaking
    - reading
    - writing
    - translation
    - dictation
    - multiple_choice
    - gap_fill

NcePagination:
  type: object
  properties:
    page:
      type: integer
    pageSize:
      type: integer
    total:
      type: integer
  required: [page, pageSize, total]

NceBook:
  type: object
  properties:
    id:
      type: string
      format: uuid
    code:
      type: string
    title:
      type: string
    level:
      type: string
    description:
      type: string
      nullable: true
    sortOrder:
      type: integer
    status:
      $ref: '#/NcePublishStatus'
    publishedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required: [id, code, title, level, description, sortOrder, status, publishedAt, createdAt, updatedAt]

NceUnit:
  type: object
  properties:
    id:
      type: string
      format: uuid
    bookId:
      type: string
      format: uuid
    unitNumber:
      type: integer
    title:
      type: string
    description:
      type: string
      nullable: true
    sortOrder:
      type: integer
    status:
      $ref: '#/NcePublishStatus'
    publishedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
  required: [id, bookId, unitNumber, title, description, sortOrder, status, publishedAt, createdAt, updatedAt]

NceLessonUnit:
  type: object
  properties:
    id:
      type: string
      format: uuid
    bookId:
      type: string
      format: uuid
    unitNumber:
      type: integer
    title:
      type: string
    status:
      $ref: '#/NcePublishStatus'
    book:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        title:
          type: string
        level:
          type: string
        status:
          $ref: '#/NcePublishStatus'
  required: [id, bookId, unitNumber, title, status]

NceObjective:
  type: object
  properties:
    id:
      type: string
      format: uuid
    lessonId:
      type: string
      format: uuid
    code:
      type: string
    title:
      type: string
    category:
      type: string
    description:
      type: string
      nullable: true
    masteryThreshold:
      type: integer
    sortOrder:
      type: integer
  required: [id, lessonId, code, title, category, description, masteryThreshold, sortOrder]

NceExercise:
  type: object
  properties:
    id:
      type: string
      format: uuid
    lessonId:
      type: string
      format: uuid
    objectiveId:
      type: string
      format: uuid
      nullable: true
    exerciseType:
      $ref: '#/NceExerciseType'
    prompt:
      type: string
    content:
      nullable: true
      description: Exercise content JSON.
    answerKey:
      nullable: true
      description: Present only for authorized teacher/admin reads.
    scoringConfig:
      nullable: true
      description: Scoring configuration JSON.
    sortOrder:
      type: integer
  required: [id, lessonId, objectiveId, exerciseType, prompt, content, scoringConfig, sortOrder]

NceLesson:
  type: object
  properties:
    id:
      type: string
      format: uuid
    unitId:
      type: string
      format: uuid
    lessonNumber:
      type: integer
    title:
      type: string
    lessonText:
      type: string
    media:
      nullable: true
      description: Media metadata JSON.
    sortOrder:
      type: integer
    status:
      $ref: '#/NcePublishStatus'
    publishedAt:
      type: string
      format: date-time
      nullable: true
    createdAt:
      type: string
      format: date-time
    updatedAt:
      type: string
      format: date-time
    teacherNotes:
      type: string
      nullable: true
      description: Present only for authorized teacher/admin reads.
    unit:
      $ref: '#/NceLessonUnit'
    objectives:
      type: array
      items:
        $ref: '#/NceObjective'
    exercises:
      type: array
      items:
        $ref: '#/NceExercise'
  required: [id, unitId, lessonNumber, title, lessonText, media, sortOrder, status, publishedAt, createdAt, updatedAt, objectives, exercises]

CourseNceLesson:
  allOf:
    - $ref: '#/NceLesson'
    - type: object
      properties:
        sequence:
          type: integer
        availableFrom:
          type: string
          format: date-time
          nullable: true
        dueAt:
          type: string
          format: date-time
          nullable: true
        canEdit:
          type: boolean
          description: True when the current actor can edit this course-scoped lesson.
        canPublish:
          type: boolean
          description: True when the current actor can publish or unpublish this course-scoped lesson.
      required: [sequence, availableFrom, dueAt, canEdit, canPublish]

NceBookListResponse:
  type: object
  properties:
    books:
      type: array
      items:
        $ref: '#/NceBook'
  required: [books]

NceUnitListResponse:
  type: object
  properties:
    units:
      type: array
      items:
        $ref: '#/NceUnit'
  required: [units]

NceLessonListResponse:
  type: object
  properties:
    lessons:
      type: array
      items:
        $ref: '#/NceLesson'
    pagination:
      $ref: '#/NcePagination'
  required: [lessons, pagination]

CourseNceLessonListResponse:
  type: object
  properties:
    lessons:
      type: array
      items:
        $ref: '#/CourseNceLesson'
    pagination:
      $ref: '#/NcePagination'
  required: [lessons, pagination]

NceObjectiveWrite:
  type: object
  properties:
    code:
      type: string
    title:
      type: string
    category:
      type: string
    description:
      type: string
      nullable: true
    masteryThreshold:
      type: integer
      minimum: 1
      maximum: 100
      default: 80
    sortOrder:
      type: integer
      minimum: 0
      default: 0
  required: [code, title, category, masteryThreshold, sortOrder]

NceExerciseWrite:
  type: object
  properties:
    objectiveId:
      type: string
      format: uuid
      nullable: true
    objectiveCode:
      type: string
      description: Client-side convenience key for matching exercises to newly authored objectives.
    exerciseType:
      $ref: '#/NceExerciseType'
    prompt:
      type: string
    content:
      type: object
      additionalProperties: true
    answerKey:
      type: object
      additionalProperties: true
      description: Non-empty answer object. Supported answer fields include correctChoiceId, choice, answer, sentence, answers, acceptedAnswers, blanks, sample, accepted, rubric, and matches.
    scoringConfig:
      type: object
      nullable: true
      additionalProperties: true
    sortOrder:
      type: integer
      minimum: 0
      default: 0
  required: [exerciseType, prompt, content, answerKey, sortOrder]

NceLessonCreateRequest:
  type: object
  properties:
    unitId:
      type: string
      format: uuid
    lessonNumber:
      type: integer
      minimum: 1
    title:
      type: string
    lessonText:
      type: string
    media:
      type: object
      nullable: true
      additionalProperties: true
    teacherNotes:
      type: string
      nullable: true
    sortOrder:
      type: integer
      minimum: 0
      default: 0
    objectives:
      type: array
      items:
        $ref: '#/NceObjectiveWrite'
      default: []
    exercises:
      type: array
      items:
        $ref: '#/NceExerciseWrite'
      default: []
  required: [unitId, lessonNumber, title, lessonText, sortOrder, objectives, exercises]

NceLessonPatchRequest:
  type: object
  description: Same fields as create; all fields are optional for PATCH.
  properties:
    unitId:
      type: string
      format: uuid
    lessonNumber:
      type: integer
      minimum: 1
    title:
      type: string
    lessonText:
      type: string
    media:
      type: object
      nullable: true
      additionalProperties: true
    teacherNotes:
      type: string
      nullable: true
    sortOrder:
      type: integer
      minimum: 0
    objectives:
      type: array
      items:
        $ref: '#/NceObjectiveWrite'
    exercises:
      type: array
      items:
        $ref: '#/NceExerciseWrite'

CourseNceLessonAssignmentRequest:
  type: object
  properties:
    lessons:
      type: array
      items:
        type: object
        properties:
          lessonId:
            type: string
            format: uuid
          sequence:
            type: integer
            minimum: 1
          availableFrom:
            type: string
            format: date-time
            nullable: true
          dueAt:
            type: string
            format: date-time
            nullable: true
        required: [lessonId, sequence]
  required: [lessons]

CourseNceLessonAssignmentResponse:
  type: object
  properties:
    courseId:
      type: string
      format: uuid
    assignedCount:
      type: integer
  required: [courseId, assignedCount]
