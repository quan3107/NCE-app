# File: docs/openapi/schemas/cms.yaml
# Purpose: Define CMS marketing response schemas.
# Why: Documents homepage/about payload contracts consumed by the frontend.

HeroContent:
  type: object
  properties:
    badge:
      type: string
    title:
      type: string
    description:
      type: string
    cta_primary:
      type: string
    cta_secondary:
      type: string
  required: [badge, title, description, cta_primary, cta_secondary]

StatItem:
  type: object
  properties:
    itemKey:
      type: string
      enum: [stat_students, stat_band_score, stat_success_rate]
    label:
      type: string
    value:
      type: number
    format:
      type: string
      enum: [number, decimal, percentage]
    suffix:
      type: string
  required: [itemKey, label, value, format]

FeatureItem:
  type: object
  properties:
    icon:
      type: string
    title:
      type: string
    description:
      type: string
  required: [icon, title, description]

HowItWorksContent:
  type: object
  properties:
    title:
      type: string
    description:
      type: string
    features:
      type: array
      items:
        $ref: './cms.yaml#/FeatureItem'
  required: [title, description, features]

HomepageContent:
  type: object
  properties:
    hero:
      $ref: './cms.yaml#/HeroContent'
    stats:
      type: array
      description: Exactly one item is required for each canonical realtime statistic key.
      minItems: 3
      maxItems: 3
      items:
        $ref: './cms.yaml#/StatItem'
    howItWorks:
      $ref: './cms.yaml#/HowItWorksContent'
  required: [hero, stats, howItWorks]

AboutHeroContent:
  type: object
  properties:
    title:
      type: string
    description:
      type: string
  required: [title, description]

ValueItem:
  type: object
  properties:
    icon:
      type: string
    title:
      type: string
    description:
      type: string
  required: [icon, title, description]

AboutStory:
  type: object
  properties:
    sections:
      type: array
      items:
        type: string
  required: [sections]

AboutPageContent:
  type: object
  properties:
    hero:
      $ref: './cms.yaml#/AboutHeroContent'
    values:
      type: array
      items:
        $ref: './cms.yaml#/ValueItem'
    story:
      $ref: './cms.yaml#/AboutStory'
  required: [hero, values, story]

ContactPageContent:
  type: object
  required: [header, form, details, hours]
  properties:
    header:
      type: object
      required: [title, description]
      properties:
        title: { type: string }
        description: { type: string }
    form:
      type: object
      required: [title, description, submitLabel]
      properties:
        title: { type: string }
        description: { type: string }
        submitLabel: { type: string }
    details:
      type: object
      required: [email, phone, address]
      properties:
        email: { type: string, format: email }
        phone: { type: string }
        address: { type: string }
    hours:
      type: array
      items:
        type: object
        required: [label, value]
        properties:
          label: { type: string }
          value: { type: string }

CmsPageContent:
  oneOf:
    - $ref: './cms.yaml#/HomepageContent'
    - $ref: './cms.yaml#/AboutPageContent'
    - $ref: './cms.yaml#/ContactPageContent'

CmsPageKeyParameter:
  name: pageKey
  in: path
  required: true
  schema:
    type: string
    enum: [homepage, about, contact]

CmsPageSummary:
  type: object
  required:
    - pageKey
    - label
    - draftVersion
    - publishedDraftVersion
    - publishedRevision
    - publishedAt
    - hasUnpublishedChanges
  properties:
    pageKey: { type: string, enum: [homepage, about, contact] }
    label: { type: string }
    draftVersion: { type: integer }
    publishedDraftVersion: { type: integer }
    publishedRevision: { type: integer }
    publishedAt: { type: string, format: date-time, nullable: true }
    updatedAt: { type: string, format: date-time }
    hasUnpublishedChanges: { type: boolean }

CmsPageState:
  allOf:
    - $ref: './cms.yaml#/CmsPageSummary'
    - type: object
      required: [content]
      properties:
        content:
          $ref: './cms.yaml#/CmsPageContent'

CmsPagesResponse:
  type: object
  required: [pages]
  properties:
    pages:
      type: array
      items:
        $ref: './cms.yaml#/CmsPageSummary'

CmsDraftUpdate:
  type: object
  additionalProperties: false
  required: [content, expectedDraftVersion]
  properties:
    content:
      $ref: './cms.yaml#/CmsPageContent'
    expectedDraftVersion:
      type: integer
      minimum: 0
      description: Draft version loaded when the administrator began editing.

CmsPublishRequest:
  type: object
  additionalProperties: false
  required: [content, expectedDraftVersion]
  properties:
    content:
      $ref: './cms.yaml#/CmsPageContent'
    expectedDraftVersion:
      type: integer
      minimum: 0
      description: Draft version loaded when the administrator reviewed this content.

CmsRollbackRequest:
  type: object
  additionalProperties: false
  required: [expectedDraftVersion]
  properties:
    expectedDraftVersion:
      type: integer
      minimum: 0
      description: Draft version loaded before the administrator requested rollback.

CmsRevision:
  type: object
  required: [id, revisionNumber, operation, createdAt]
  properties:
    id: { type: string, format: uuid }
    revisionNumber: { type: integer }
    operation: { type: string, enum: [publish, rollback] }
    createdAt: { type: string, format: date-time }
    createdBy:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        fullName: { type: string }
    sourceRevision:
      type: object
      nullable: true
      properties:
        id: { type: string, format: uuid }
        revisionNumber: { type: integer }

CmsRevisionsResponse:
  type: object
  required: [revisions, nextCursor]
  properties:
    revisions:
      type: array
      items:
        $ref: './cms.yaml#/CmsRevision'
    nextCursor:
      type: string
      format: uuid
      nullable: true

RefreshStatsResponse:
  type: object
  properties:
    message:
      type: string
    content:
      $ref: './cms.yaml#/HomepageContent'
  required: [message, content]
