# File: docs/openapi/paths/files.yaml
# Purpose: Define file upload OpenAPI path items.
# Why: Documents upload signing/completion endpoints.

FileSign:
  post:
    tags: [files]
    summary: Sign file upload
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/files.yaml#/FileSignRequest'
    responses:
      '200':
        description: Signed upload details
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/FileSignResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

FileComplete:
  post:
    tags: [files]
    summary: Complete file upload
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/files.yaml#/FileCompleteRequest'
    responses:
      '201':
        description: File record created
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/File'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

FileDownload:
  get:
    tags: [files]
    summary: Sign file download
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Signed download details
        content:
          application/json:
            schema:
              $ref: '../schemas/files.yaml#/FileDownloadResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden without object-key details
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Missing or deleted file
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
