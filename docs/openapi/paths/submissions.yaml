# File: docs/openapi/paths/submissions.yaml
# Purpose: Define submission OpenAPI path items.
# Why: Documents submission endpoints scoped to assignments.

AssignmentSubmissions:
  get:
    tags: [submissions]
    summary: List submissions for an assignment (admin/teacher; students see their own)
    parameters:
      - in: path
        name: assignmentId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Submissions
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '../schemas/submissions.yaml#/Submission'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
  post:
    tags: [submissions]
    summary: Create submission (student)
    parameters:
      - in: path
        name: assignmentId
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/submissions.yaml#/CreateSubmissionRequest'
    responses:
      '201':
        description: Submission created
        content:
          application/json:
            schema:
              $ref: '../schemas/submissions.yaml#/Submission'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

PendingSubmissionsCount:
  get:
    tags: [submissions]
    summary: Get ungraded submissions count (teacher/admin)
    description: Returns the count of ungraded (submitted or late, no grade) submissions for courses owned by the authenticated teacher/admin.
    responses:
      '200':
        description: Ungraded submissions count
        content:
          application/json:
            schema:
              type: object
              properties:
                count:
                  type: integer
                  description: Number of ungraded submissions
              required: [count]
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden - Only teachers and admins can access this endpoint
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

AssignmentSubmissionById:
  get:
    tags: [submissions]
    summary: Get submission (admin/teacher)
    parameters:
      - in: path
        name: assignmentId
        required: true
        schema:
          type: string
          format: uuid
      - in: path
        name: submissionId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Submission
        content:
          application/json:
            schema:
              $ref: '../schemas/submissions.yaml#/Submission'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

SubmissionWritingAiFeedback:
  get:
    tags: [ai-feedback, submissions]
    summary: Get AI writing feedback draft status
    description: >
      Returns the latest AI writing feedback draft status for an authorized
      course teacher or admin. Active queued/running drafts include the same
      polling location returned by the manual generation request.
    parameters:
      - in: path
        name: submissionId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Latest writing feedback draft is terminal and readable to the requester.
        content:
          application/json:
            schema:
              $ref: '../schemas/ai-feedback.yaml#/WritingFeedbackResponse'
      '202':
        description: Latest writing feedback generation is queued or running.
        content:
          application/json:
            schema:
              $ref: '../schemas/ai-feedback.yaml#/WritingFeedbackResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden, or AI writing feedback is disabled by assignment policy.
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: No writing feedback draft exists for this submission.
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '409':
        description: Latest writing feedback draft is in a non-success terminal state.
        content:
          application/json:
            schema:
              $ref: '../schemas/ai-feedback.yaml#/WritingFeedbackResponse'
    security:
      - BearerAuth: []

  post:
    tags: [ai-feedback, submissions]
    summary: Request AI writing feedback draft generation
    description: >
      Allows an authorized course teacher or admin to manually request or
      regenerate AI feedback for a submitted IELTS writing response. Drafts
      remain separate from final grade feedback; teacher-reviewed drafts stay
      hidden from students, while instant-student-visible drafts are provisional.
      Visual Task 1 requests require backend-validated hosted image context or
      return a teacher-review-only status explaining why image context is
      unavailable.
    parameters:
      - in: path
        name: submissionId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Existing or regenerated writing feedback draft is already terminal and readable to the requester.
        content:
          application/json:
            schema:
              $ref: '../schemas/ai-feedback.yaml#/WritingFeedbackResponse'
      '202':
        description: Writing feedback generation has been queued or is running.
        headers:
          Location:
            description: Polling location for the writing feedback draft request.
            schema:
              type: string
        content:
          application/json:
            schema:
              $ref: '../schemas/ai-feedback.yaml#/WritingFeedbackResponse'
      '400':
        description: Submission is not a writing assignment or request parameters are invalid.
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden or AI writing feedback is disabled by assignment policy.
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '409':
        description: Feedback cannot be queued because the submission is not ready, a duplicate draft is active, or review is required.
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '../schemas/ai-feedback.yaml#/WritingFeedbackResponse'
                - $ref: '../schemas/common.yaml#/ErrorResponse'
      '413':
        description: AI writing feedback input exceeds the configured maximum size.
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '503':
        description: AI feedback generation is disabled globally or provider configuration is unavailable.
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
