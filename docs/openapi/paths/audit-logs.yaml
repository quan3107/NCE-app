# File: docs/openapi/paths/audit-logs.yaml
# Purpose: Define audit log OpenAPI path items.
# Why: Documents admin access to system audit history.

AuditLogs:
  get:
    tags: [audit-logs]
    summary: List audit logs (admin)
    parameters:
      - in: query
        name: actorId
        schema:
          type: string
          format: uuid
        description: Restrict results to audit rows written for a specific actor.
      - in: query
        name: action
        schema:
          type: string
        description: Restrict results to an exact audit action.
      - in: query
        name: entity
        schema:
          type: string
        description: Restrict results to an entity type.
      - in: query
        name: entityId
        schema:
          type: string
        description: Restrict results to an entity identifier.
      - in: query
        name: createdFrom
        schema:
          type: string
          format: date-time
        description: Return audit rows created at or after this timestamp.
      - in: query
        name: createdTo
        schema:
          type: string
          format: date-time
        description: Return audit rows created at or before this timestamp.
      - in: query
        name: limit
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
        description: Max number of audit logs to return (default 50).
      - in: query
        name: offset
        schema:
          type: integer
          format: int32
          minimum: 0
        description: Number of matching audit rows to skip before returning results.
    responses:
      '200':
        description: Audit logs
        content:
          application/json:
            schema:
              $ref: '../schemas/audit-logs.yaml#/AuditLogPage'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
