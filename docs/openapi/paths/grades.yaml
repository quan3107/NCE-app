# File: docs/openapi/paths/grades.yaml
# Purpose: Define grade OpenAPI path items.
# Why: Documents grade retrieval and update endpoints.

SubmissionGrade:
  get:
    tags: [grades]
    summary: Get grade (admin/teacher/student owner)
    description: >
      Admins can read any active grade, teachers can read grades for submissions in
      courses they own or teach, and students can read grades only for their own
      submissions.
    parameters:
      - in: path
        name: submissionId
        required: true
        schema:
          type: string
          format: uuid
    responses:
      '200':
        description: Grade
        content:
          application/json:
            schema:
              $ref: '../schemas/grades.yaml#/Grade'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
  put:
    tags: [grades]
    summary: Upsert grade (admin/teacher)
    description: >
      Creates or updates a grade. For IELTS writing and speaking assignments,
      the server validates official IELTS criteria, requires 0.5-increment band
      values from 0 to 9, and derives rawScore, finalScore, and band from the
      submitted criterion breakdown.
    parameters:
      - in: path
        name: submissionId
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/grades.yaml#/UpsertGradeRequest'
    responses:
      '200':
        description: Grade upserted
        content:
          application/json:
            schema:
              $ref: '../schemas/grades.yaml#/Grade'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '400':
        description: Invalid grade payload
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
