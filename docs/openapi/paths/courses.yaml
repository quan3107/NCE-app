      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/courses.yaml#/UpdateCourseRequest'
    responses:
      '200':
        description: Course updated
        content:
          application/json:
            schema:
              $ref: '../schemas/courses.yaml#/CourseMutationResponse'
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Course not found or archived
        content:
          application/json:
            schema:
