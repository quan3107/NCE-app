# File: docs/openapi/paths/courses.yaml
# Purpose: Define course-related OpenAPI path items.
# Why: Captures course listing and roster management endpoints.

Courses:
  get:
    tags: [courses]
    summary: List courses (public or scoped)
    parameters:
      - in: query
        name: status
        schema:
          type: string
          enum: [active, archived, all]
        description: Authenticated lists default to active courses; admins and scoped users can request archived or all visible courses.
      - in: query
        name: includeArchived
        schema:
          type: boolean
        description: Authenticated shortcut for including archived courses alongside active courses.
    responses:
      '200':
        description: Courses
        content:
          application/json:
            schema:
              $ref: '../schemas/courses.yaml#/CourseListResponse'
      '500':
        description: Server error
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security: []
  post:
    tags: [courses]
    summary: Create course (admin/teacher)
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/courses.yaml#/CreateCourseRequest'
    responses:
      '201':
        description: Course created
        content:
          application/json:
            schema:
              $ref: '../schemas/courses.yaml#/Course'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '409':
        description: Conflict
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

