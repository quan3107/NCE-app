NceLesson:
  get:
    tags: [nce-content]
    summary: Get NCE lesson detail
    parameters:
      - in: path
        name: lessonId
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/IncludeDrafts'
      - $ref: '#/components/parameters/CourseId'
    responses:
      '200':
        description: NCE lesson
        content:
          application/json:
            schema:
              $ref: '../schemas/nce-content.yaml#/NceLesson'
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '401':
        description: Unauthorized when includeDrafts=true or an invalid bearer token is supplied
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - {}
      - BearerAuth: []
  patch:
    tags: [nce-content]
    summary: Update an NCE lesson draft
    parameters:
      - in: path
        name: lessonId
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/TeacherWriteCourseId'
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/nce-content.yaml#/NceLessonPatchRequest'
    responses:
      '200':
        description: Updated NCE lesson
        content:
          application/json:
            schema:
              $ref: '../schemas/nce-content.yaml#/NceLesson'
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Teacher or admin access required
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Lesson or parent unit not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

