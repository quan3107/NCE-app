NceLessonPublish:
  post:
    tags: [nce-content]
    summary: Publish an NCE lesson
    parameters:
      - in: path
        name: lessonId
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/TeacherWriteCourseId'
    responses:
      '200':
        description: Published NCE lesson
        content:
          application/json:
            schema:
              $ref: '../schemas/nce-content.yaml#/NceLesson'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Teacher or admin access required
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Lesson not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '409':
        description: Lesson is incomplete or parent content is unpublished
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

