CourseNceLessons:
  get:
    tags: [nce-content]
    summary: List NCE lessons assigned to a course
    parameters:
      - in: path
        name: courseId
        required: true
        schema:
          type: string
          format: uuid
      - $ref: '#/components/parameters/IncludeDrafts'
      - $ref: '#/components/parameters/Page'
      - $ref: '#/components/parameters/PageSize'
    responses:
      '200':
        description: Course-assigned NCE lessons
        content:
          application/json:
            schema:
              $ref: '../schemas/nce-content.yaml#/CourseNceLessonListResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Course not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []
  put:
    tags: [nce-content]
    summary: Replace ordered NCE lesson assignments for a course
    parameters:
      - in: path
        name: courseId
        required: true
        schema:
          type: string
          format: uuid
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../schemas/nce-content.yaml#/CourseNceLessonAssignmentRequest'
    responses:
      '200':
        description: Assignment update result
        content:
          application/json:
            schema:
              $ref: '../schemas/nce-content.yaml#/CourseNceLessonAssignmentResponse'
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '401':
        description: Unauthorized
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Teacher or admin course access required
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Course not found
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - BearerAuth: []

components:
  parameters:
    IncludeDrafts:
      in: query
      name: includeDrafts
      schema:
        type: boolean
        default: false
      description: Teachers and admins can include draft content when authorized for the supplied course context.
    CourseId:
      in: query
      name: courseId
      schema:
        type: string
        format: uuid
      description: Required when includeDrafts=true on public NCE content routes. Use /api/v1/courses/{courseId}/nce-lessons for course-assigned published lessons.
    TeacherWriteCourseId:
      in: query
      name: courseId
      required: true
      schema:
        type: string
        format: uuid
      description: Course context used to authorize teacher NCE lesson updates, publish, and unpublish actions.
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
