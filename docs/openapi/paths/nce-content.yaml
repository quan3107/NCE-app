# File: docs/openapi/paths/nce-content.yaml
# Purpose: Define NCE content OpenAPI path items.
# Why: Documents published reads plus teacher/admin lesson authoring.

NceBooks:
  get:
    tags: [nce-content]
    summary: List NCE books
    parameters:
      - $ref: '#/components/parameters/IncludeDrafts'
      - $ref: '#/components/parameters/CourseId'
    responses:
      '200':
        description: NCE books
        content:
          application/json:
            schema:
              $ref: '../schemas/nce-content.yaml#/NceBookListResponse'
      '400':
        description: Validation failed
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '401':
        description: Unauthorized when includeDrafts=true or an invalid bearer token is supplied
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '403':
        description: Forbidden for unauthorized course draft context
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
      '404':
        description: Course not found for draft context
        content:
          application/json:
            schema:
              $ref: '../schemas/common.yaml#/ErrorResponse'
    security:
      - {}
      - BearerAuth: []

