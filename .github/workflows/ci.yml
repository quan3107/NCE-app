# File: .github/workflows/ci.yml
# Purpose: Run release-gate checks for the root, frontend, and backend packages.
# Why: Keeps pull requests from merging when installs, audits, builds, or tests fail.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  CI: "true"

jobs:
  root:
    name: Root install and audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Audit root dependencies
        run: npm audit --audit-level=high

  frontend:
    name: Frontend install, lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Install frontend browser dependencies
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Test frontend with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Test frontend components
        run: npm run test:components
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Test frontend classroom workflow
        run: npm run e2e
        working-directory: frontend

  backend:
    name: Backend install, audit, lint, build, and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nce_test
          POSTGRES_USER: nce
          POSTGRES_PASSWORD: nce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nce -d nce_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nce_runtime:nce_runtime@localhost:5432/nce_test
      JOB_DATABASE_URL: postgresql://nce_job_runner:nce_job_runner@localhost:5432/nce_test
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/nce_test
      JWT_PRIVATE_KEY_PATH: tests/runtime/generated-jwt-private.pem
      JWT_PUBLIC_KEY_PATH: tests/runtime/generated-jwt-public.pem
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:4000/api/v1/auth/google/callback
      BREVO_API_KEY: test-brevo-api-key
      BREVO_SENDER_NAME: NCE Tests
      BREVO_SENDER_EMAIL: tests@example.com
      LOG_LEVEL: silent
      LOG_PRETTY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --ignore-scripts
        working-directory: backend

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Generate backend Prisma client
        run: npm run prisma:generate
        working-directory: backend

      - name: Create backend database roles
        run: |
          docker exec -i "${{ job.services.postgres.id }}" psql -U nce -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role BYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticator') THEN
              CREATE ROLE authenticator NOLOGIN;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'supabase_admin') THEN
              CREATE ROLE supabase_admin NOLOGIN CREATEROLE;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'postgres') THEN
              CREATE ROLE postgres LOGIN PASSWORD 'postgres'
                CREATEDB CREATEROLE REPLICATION BYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nce_runtime') THEN
              CREATE ROLE nce_runtime LOGIN PASSWORD 'nce_runtime'
                NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE
                NOREPLICATION NOBYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nce_job_runner') THEN
              CREATE ROLE nce_job_runner LOGIN PASSWORD 'nce_job_runner'
                NOINHERIT NOSUPERUSER NOCREATEDB NOCREATEROLE
                NOREPLICATION NOBYPASSRLS;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nce_app_anon') THEN
              CREATE ROLE nce_app_anon LOGIN CREATEDB CREATEROLE
                REPLICATION BYPASSRLS;
            END IF;
            IF NOT EXISTS (
              SELECT FROM pg_roles WHERE rolname = 'nce_app_authenticated'
            ) THEN
              CREATE ROLE nce_app_authenticated LOGIN CREATEDB CREATEROLE
                REPLICATION BYPASSRLS;
            END IF;
          END
          $$;
          GRANT nce_app_anon, nce_app_authenticated TO postgres
            WITH ADMIN TRUE, SET FALSE, INHERIT FALSE;
          GRANT service_role TO supabase_admin
            WITH ADMIN TRUE, SET TRUE, INHERIT TRUE;
          SET ROLE supabase_admin;
          GRANT service_role TO postgres
            WITH ADMIN TRUE, SET TRUE, INHERIT TRUE;
          RESET ROLE;
          GRANT anon, authenticated TO postgres
            WITH ADMIN TRUE, SET FALSE, INHERIT FALSE;
          SET ROLE postgres;
          GRANT service_role TO nce_runtime
            WITH ADMIN FALSE, SET TRUE, INHERIT FALSE;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO service_role;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO service_role;
          RESET ROLE;
          GRANT CONNECT, CREATE ON DATABASE nce_test TO postgres;
          GRANT USAGE, CREATE ON SCHEMA public TO postgres;
          GRANT CONNECT ON DATABASE nce_test TO nce_runtime;
          GRANT CONNECT ON DATABASE nce_test TO nce_job_runner;
          ALTER ROLE postgres SET app.current_user_role = 'admin';
          SQL

      - name: Install or upgrade pg-boss
        run: npm run pgboss:install
        working-directory: backend

      - name: Apply backend migrations
        run: npm run prisma:deploy
        working-directory: backend

      - name: Verify non-superuser runtime role boundary
        run: |
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 \
            -c 'ALTER ROLE postgres RESET app.current_user_role;'
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (
              SELECT 1
              FROM pg_auth_members membership
              JOIN pg_roles granted ON granted.oid = membership.roleid
              JOIN pg_roles member ON member.oid = membership.member
              JOIN pg_roles grantor ON grantor.oid = membership.grantor
              WHERE granted.rolname = 'service_role'
                AND member.rolname = 'postgres'
                AND grantor.rolname = 'supabase_admin'
                AND membership.admin_option
                AND membership.inherit_option
                AND membership.set_option
            ) OR NOT EXISTS (
              SELECT 1
              FROM pg_auth_members membership
              JOIN pg_roles granted ON granted.oid = membership.roleid
              JOIN pg_roles member ON member.oid = membership.member
              JOIN pg_roles grantor ON grantor.oid = membership.grantor
              WHERE granted.rolname = 'service_role'
                AND member.rolname = 'nce_runtime'
                AND grantor.rolname = 'postgres'
                AND NOT membership.admin_option
                AND NOT membership.inherit_option
                AND membership.set_option
            ) THEN
              RAISE EXCEPTION 'hosted-style service_role grantors were not preserved';
            END IF;
          END
          $$;
          SQL
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce_runtime -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT pg_has_role(current_user, 'nce_app_anon', 'SET') OR
               NOT pg_has_role(current_user, 'nce_app_authenticated', 'SET') OR
               NOT pg_has_role(current_user, 'service_role', 'SET') THEN
              RAISE EXCEPTION 'runtime login cannot SET ROLE into required roles';
            END IF;
            IF pg_has_role(
              current_user, 'service_role', 'MEMBER WITH ADMIN OPTION'
            ) THEN
              RAISE EXCEPTION 'runtime login received service_role ADMIN OPTION';
            END IF;
            IF has_table_privilege('nce_app_anon', 'public.users', 'TRUNCATE') OR
               has_table_privilege('nce_app_authenticated', 'public.users', 'REFERENCES') OR
               has_table_privilege('nce_app_authenticated', 'public.users', 'TRIGGER') THEN
              RAISE EXCEPTION 'runtime roles received non-DML table privileges';
            END IF;
          END
          $$;
          BEGIN;
          SET LOCAL ROLE nce_app_anon;
          SELECT current_user;
          ROLLBACK;
          BEGIN;
          SET LOCAL ROLE nce_app_authenticated;
          SELECT current_user;
          ROLLBACK;
          BEGIN;
          SET LOCAL ROLE service_role;
          SELECT count(*) FROM public.auth_sessions;
          ROLLBACK;
          SQL
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce_job_runner -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF has_table_privilege(current_user, 'public.users', 'SELECT') OR
               pg_has_role(current_user, 'service_role', 'SET') THEN
              RAISE EXCEPTION 'job runner can access application data roles';
            END IF;
          END
          $$;
          SELECT version FROM pgboss.version;
          SQL
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE nce_unreviewed_runtime_role NOLOGIN;
          GRANT nce_unreviewed_runtime_role TO nce_runtime
            WITH ADMIN FALSE, SET TRUE, INHERIT FALSE;
          SQL
          if docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 \
            < backend/tests/prisma/runtimeRoleBoundary.probe.sql; then
            echo "runtime role probe accepted an unexpected nce_runtime membership"
            exit 1
          fi
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          REVOKE nce_unreviewed_runtime_role FROM nce_runtime;
          DROP ROLE nce_unreviewed_runtime_role;
          SQL
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 \
            < backend/tests/prisma/runtimeRoleBoundary.probe.sql

      - name: Seed backend CMS test content
        run: npm run seed:cms
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Build backend
        run: npx tsc --project tsconfig.json
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend
