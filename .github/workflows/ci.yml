# File: .github/workflows/ci.yml
# Purpose: Run release-gate checks for the root, frontend, and backend packages.
# Why: Keeps pull requests from merging when installs, audits, builds, or tests fail.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NODE_VERSION: "20"
  CI: "true"

jobs:
  root:
    name: Root install and audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Audit root dependencies
        run: npm audit --audit-level=high

  frontend:
    name: Frontend install, audit, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Test frontend
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  backend:
    name: Backend install, audit, lint, build, and test
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nce:nce@localhost:5432/nce_test
      JWT_PRIVATE_KEY_PATH: tests/fixtures/private.pem
      JWT_PUBLIC_KEY_PATH: tests/fixtures/public.pem
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:4000/api/v1/auth/google/callback
      BREVO_API_KEY: test-brevo-api-key
      BREVO_SENDER_NAME: NCE Tests
      BREVO_SENDER_EMAIL: tests@example.com
      LOG_LEVEL: silent
      LOG_PRETTY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --ignore-scripts
        working-directory: backend

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend
