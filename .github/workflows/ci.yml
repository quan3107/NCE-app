# File: .github/workflows/ci.yml
# Purpose: Run release-gate checks for the root, frontend, and backend packages.
# Why: Keeps pull requests from merging when installs, audits, builds, or tests fail.

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "24"
  CI: "true"

jobs:
  root:
    name: Root install and audit
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install root dependencies
        run: npm ci --ignore-scripts

      - name: Audit root dependencies
        run: npm audit --audit-level=high

  frontend:
    name: Frontend install, lint, test, and build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --ignore-scripts
        working-directory: frontend

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Install frontend browser dependencies
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Typecheck frontend
        run: npm run typecheck
        working-directory: frontend

      - name: Test frontend with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Test frontend components
        run: npm run test:components
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Test frontend classroom workflow
        run: npm run e2e
        working-directory: frontend

  backend:
    name: Backend install, audit, lint, build, and test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: nce_test
          POSTGRES_USER: nce
          POSTGRES_PASSWORD: nce
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nce -d nce_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://nce_runtime:nce_runtime@localhost:5432/nce_test
      DIRECT_URL: postgresql://nce_runtime:nce_runtime@localhost:5432/nce_test
      JWT_PRIVATE_KEY_PATH: tests/runtime/generated-jwt-private.pem
      JWT_PUBLIC_KEY_PATH: tests/runtime/generated-jwt-public.pem
      GOOGLE_CLIENT_ID: test-google-client-id
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      GOOGLE_REDIRECT_URI: http://localhost:4000/api/v1/auth/google/callback
      BREVO_API_KEY: test-brevo-api-key
      BREVO_SENDER_NAME: NCE Tests
      BREVO_SENDER_EMAIL: tests@example.com
      LOG_LEVEL: silent
      LOG_PRETTY: "false"
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci --ignore-scripts
        working-directory: backend

      - name: Audit backend dependencies
        run: npm audit --audit-level=high
        working-directory: backend

      - name: Generate backend Prisma client
        run: npm run prisma:generate
        working-directory: backend

      - name: Create backend database roles
        run: |
          docker exec -i "${{ job.services.postgres.id }}" psql -U nce -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'nce_runtime') THEN
              CREATE ROLE nce_runtime LOGIN PASSWORD 'nce_runtime' CREATEROLE;
            END IF;
          END
          $$;
          GRANT anon, authenticated TO nce_runtime
            WITH ADMIN TRUE, SET FALSE, INHERIT FALSE;
          GRANT CONNECT, CREATE ON DATABASE nce_test TO nce_runtime;
          GRANT USAGE, CREATE ON SCHEMA public TO nce_runtime;
          SQL

      - name: Apply backend migrations
        run: |
          hardened_migration="src/prisma/migrations/20260712220000_harden_data_api_runtime_roles"
          held_migration="${RUNNER_TEMP}/20260712220000_harden_data_api_runtime_roles"
          mv "${hardened_migration}" "${held_migration}"
          trap 'mv "${held_migration}" "${hardened_migration}"' EXIT
          DATABASE_URL=postgresql://nce:nce@localhost:5432/nce_test \
            DIRECT_URL=postgresql://nce:nce@localhost:5432/nce_test \
            npx prisma migrate deploy --config prisma.config.ts
          mv "${held_migration}" "${hardened_migration}"
          trap - EXIT
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce -d nce_test -v ON_ERROR_STOP=1 \
            -c 'REASSIGN OWNED BY nce TO nce_runtime;'
          npx prisma migrate deploy --config prisma.config.ts
        working-directory: backend

      - name: Verify non-superuser runtime role boundary
        run: |
          docker exec -i "${{ job.services.postgres.id }}" \
            psql -U nce_runtime -d nce_test -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          BEGIN
            IF NOT pg_has_role(current_user, 'nce_app_anon', 'SET') OR
               NOT pg_has_role(current_user, 'nce_app_authenticated', 'SET') THEN
              RAISE EXCEPTION 'runtime login cannot SET ROLE into application roles';
            END IF;
            IF has_table_privilege('nce_app_anon', 'public.users', 'TRUNCATE') OR
               has_table_privilege('nce_app_authenticated', 'public.users', 'REFERENCES') OR
               has_table_privilege('nce_app_authenticated', 'public.users', 'TRIGGER') THEN
              RAISE EXCEPTION 'runtime roles received non-DML table privileges';
            END IF;
          END
          $$;
          BEGIN;
          SET LOCAL ROLE nce_app_anon;
          SELECT current_user;
          ROLLBACK;
          BEGIN;
          SET LOCAL ROLE nce_app_authenticated;
          SELECT current_user;
          ROLLBACK;
          SQL

      - name: Seed backend CMS test content
        run: npm run seed:cms
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Build backend
        run: npx tsc --project tsconfig.json
        working-directory: backend

      - name: Test backend
        run: npm test
        working-directory: backend
